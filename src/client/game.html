<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <link rel="stylesheet" type="text/css" href="game.css" />
    <title>MuCaching</title>
  </head>
  <body>
    <div id="hw-controls">
      <select id="audioDevice">
        <option value="">Gerät auswählen...</option>
      </select>
      <button id="startBtn">Start</button>
      <button id="stopBtn" disabled>Stop</button>
      <input type="file" id="audioFile" accept="audio/*" />
      <button id="midiBtn">MIDI Synth</button>
    </div>

    <div id="canvas-container">
      <canvas id="glCanvas"></canvas>
    </div>

    <div id="status">Status: Bereit</div>

    <script type="module" src="game.ts"></script>
  </body>
</html>
